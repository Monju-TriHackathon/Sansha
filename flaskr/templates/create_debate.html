<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>議論作成</title>
</head>
<body>
    <h1>議論作成</h1>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <ul>
            {% for message in messages %}
                <li>{{ message }}</li>
            {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}

    <form method="post">
        <label for="title">タイトル:</label>
        <input type="text" id="title" name="title" required><br>

        <label for="description">説明:</label>
        <textarea id="description" name="description" required></textarea><br>

        <fieldset>
            <legend>詳細設定</legend>

            <label for="method">議論方式:</label>
            <select id="method" name="method">
                <option value="0" selected>ターン制</option>
                <option value="1">リアルタイム制</option>
            </select><br>

            <label for="max_number_of_votes">最大投票数:</label>
            <input type="number" id="max_number_of_votes" name="max_number_of_votes" value="100" min="1"><br>

            <label for="challenger_waiting_period_minutes">挑戦者待機期間 (分):</label>
            <input type="number" id="challenger_waiting_period_minutes" name="challenger_waiting_period_minutes" value="2880" min="1"><br>

            <label for="debate_period_minutes">議論期間 (分):</label>
            <input type="number" id="debate_period_minutes" name="debate_period_minutes" value="1440" min="1"><br>

            <label for="voting_period_minutes">投票期間 (分):</label>
            <input type="number" id="voting_period_minutes" name="voting_period_minutes" value="1440" min="1"><br>

            <div id="turn-settings">
                <label for="max_turns">最大ターン数:</label>
                <input type="number" id="max_turns" name="max_turns" value="10" min="1"><br>

                <label for="turn_time_limit_minutes">ターン時間制限 (分):</label>
                <input type="number" id="turn_time_limit_minutes" name="turn_time_limit_minutes" value="30" min="1"><br>
            </div>
        </fieldset>

        <input type="submit" value="議論を作成">
    </form>

    <script>
        document.getElementById('method').addEventListener('change', function() {
            var turnSettings = document.getElementById('turn-settings');
            turnSettings.style.display = this.value === '0' ? '' : 'none';
        });
    </script>
</body>
</html>
