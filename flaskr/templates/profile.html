<!doctype html>
<html lang="jp">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>
    <body>
        <h2>{{ user.username }} のプロフィール</h2>
        <p><strong>プロフィール:</strong> {{ user.profile or '未設定' }}</p>
        <p><strong>登録日:</strong> {{ user.created_at.strftime('%Y-%m-%d') }} (UTC)</p>
        {% if current_user.is_authenticated and current_user.user_id == user.user_id %}
            <a href="{{ url_for('user.update_profile') }}">プロフィールを編集</a>
        {% endif %}
    </body>
</html>
